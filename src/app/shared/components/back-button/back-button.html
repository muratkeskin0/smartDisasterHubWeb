<button
  type="button"
  class="back-nav"
  [class.back-nav--block]="block"
  (click)="navigate()"
  [attr.aria-label]="'common.backAria' | transloco"
>
  <span class="back-nav__icon" aria-hidden="true">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 18l-6-6 6-6" />
    </svg>
  </span>
  <span class="back-nav__label">{{ label || ('common.back' | transloco) }}</span>
</button>
