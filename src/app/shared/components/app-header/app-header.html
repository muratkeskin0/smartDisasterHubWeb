<header class="app-header">
  <div class="header-content">
    <div class="header-left">
      <a routerLink="/dashboard" class="app-title-link">
        <h1 class="app-title">Smart Disaster Hub</h1>
      </a>
      @if (isAuthenticated()) {
        <nav class="header-nav">
          <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Dashboard</a>
          <a routerLink="/text-analysis" routerLinkActive="active">Text Analysis</a>
          <a routerLink="/map" routerLinkActive="active">Map</a>
          <a routerLink="/about" routerLinkActive="active">About</a>
        </nav>
      }
    </div>
    
    <div class="header-right">
      @if (isAuthenticated()) {
        <div class="user-section">
          <a routerLink="/profile" class="user-info">
            <div class="user-avatar">
              {{ userInitials }}
            </div>
            <span class="user-name">{{ userFullName() }}</span>
          </a>
          
          <app-base-button
            variant="danger"
            size="small"
            (buttonClick)="handleLogout()"
          >
            Logout
          </app-base-button>
        </div>
      }
    </div>
  </div>
</header>
