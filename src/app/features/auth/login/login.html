<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Smart Disaster Hub</h1>
      <h2>Sign In</h2>
      <p>Sign in to your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <!-- Email -->
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          formControlName="email"
          type="email"
          placeholder="example@email.com"
          [disabled]="loading()"
          (blur)="validateEmail()"
        />
        @if (errors().email) {
          <span class="error-message">{{ errors().email }}</span>
        }
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-input">
          <input
            id="password"
            formControlName="password"
            [type]="showPassword() ? 'text' : 'password'"
            placeholder="Enter your password"
            [disabled]="loading()"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="togglePassword()"
            [disabled]="loading()"
            [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
          >
            @if (showPassword()) {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            } @else {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            }
          </button>
        </div>
        @if (errors().password) {
          <span class="error-message">{{ errors().password }}</span>
        }
      </div>

      <!-- Remember Me & Forgot Password -->
      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" [disabled]="loading()" />
          <span>Remember Me</span>
        </label>
        <a href="#" class="forgot-password" (click)="$event.preventDefault()">Forgot Password</a>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn-primary" [disabled]="loading() || loginForm.invalid">
        @if (loading()) {
          <span class="spinner"></span>
        } @else {
          <span>Sign In</span>
        }
      </button>

      <!-- Register Link -->
      <div class="auth-footer">
        <p>
          Don't have an account?
          <a routerLink="/register" class="link">Sign Up</a>
        </p>
      </div>
    </form>

    <!-- Admin Test Info -->
    <div class="test-info">
      <p><strong>Test Account:</strong></p>
      <p>Email: admin@smartdisasterhub.com</p>
      <p>Password: Admin123!</p>
    </div>
  </div>
</div>
