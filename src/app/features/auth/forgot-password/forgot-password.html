<div class="auth-container">
  <div class="auth-card">
    <div class="auth-lang-bar">
      <app-language-switcher />
    </div>
    <div class="auth-header">
      <app-logo size="auth" />
      <h2>{{ 'forgotPassword.title' | transloco }}</h2>
      <p>{{ 'forgotPassword.subtitle' | transloco }}</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">{{ 'login.email' | transloco }}</label>
        <input
          id="email"
          formControlName="email"
          type="email"
          placeholder="example@email.com"
          [disabled]="loading()"
          autocomplete="email"
        />
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading() || form.invalid">
        @if (loading()) {
          <span class="spinner"></span>
        } @else {
          <span>{{ 'forgotPassword.submit' | transloco }}</span>
        }
      </button>

      @if (serverError()) {
        <span class="error-message">{{ serverError() }}</span>
      }

      <div class="auth-footer">
        <p>
          <a routerLink="/login" class="link">{{ 'forgotPassword.backToLogin' | transloco }}</a>
        </p>
      </div>
    </form>
  </div>
</div>
