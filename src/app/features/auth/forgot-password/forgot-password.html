<div class="auth-container">
  <div class="auth-card forgot-card">
    <div class="auth-lang-bar">
      <app-language-switcher />
    </div>
    <div class="auth-header">
      <app-logo size="auth" />
      <span class="forgot-card__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="5" width="18" height="14" rx="2"/>
          <path d="m3 7 9 6 9-6"/>
        </svg>
      </span>
      <h2>{{ 'forgotPasswordPage.title' | transloco }}</h2>
      <p>{{ 'forgotPasswordPage.subtitle' | transloco }}</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">{{ 'login.email' | transloco }}</label>
        <input
          id="email"
          formControlName="email"
          type="email"
          [placeholder]="'forgotPasswordPage.emailPlaceholder' | transloco"
          [disabled]="loading()"
          autocomplete="email"
          (blur)="validateEmail()"
        />
        @if (emailError()) {
          <span class="error-message">{{ emailError() }}</span>
        }
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading() || form.invalid">
        @if (loading()) {
          <span class="spinner"></span>
        } @else {
          <span>{{ 'forgotPasswordPage.submit' | transloco }}</span>
        }
      </button>

      @if (serverError()) {
        <span class="error-message">{{ serverError() }}</span>
      }

      <div class="auth-footer">
        <a routerLink="/login" class="forgot-card__back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          {{ 'forgotPasswordPage.backToLogin' | transloco }}
        </a>
      </div>
    </form>
  </div>
</div>
