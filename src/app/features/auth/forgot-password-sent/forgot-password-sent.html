<div class="status-container">
  <div class="status-card">
    <h2>{{ 'forgotPassword.mailSentTitle' | transloco }}</h2>
    <p>{{ 'forgotPassword.mailSentSubtitle' | transloco }}</p>

    @if (email) {
      <p class="email">{{ email }}</p>
    }

    <a routerLink="/login" class="btn">{{ 'authActivation.goToLogin' | transloco }}</a>
  </div>
</div>
