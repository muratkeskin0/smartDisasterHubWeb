<div class="landing">
  <a class="landing-skip" href="#landing-footer">{{ 'landing.skipToContent' | transloco }}</a>

  <header class="landing-top">
    <app-language-switcher />
  </header>

  <main
    class="landing-viewport"
    id="landing-main"
    [class.landing-viewport--peel-1]="peeled >= 1"
    [class.landing-viewport--peel-2]="peeled >= 2">
    <div class="landing-dock" aria-label="Actions">
      @if (peeled > 0) {
        <button type="button" class="landing-dock__btn landing-dock__btn--ghost" (click)="peelTo(0)">
          {{ 'landing.backToIntro' | transloco }}
        </button>
      }
      <a routerLink="/login" class="landing-dock__btn landing-dock__btn--primary">{{ 'landing.signIn' | transloco }}</a>
      <a routerLink="/register" class="landing-dock__btn landing-dock__btn--ghost">{{ 'landing.createAccount' | transloco }}</a>
    </div>
    <section
      class="landing-panel landing-panel--media landing-panel--media-2"
      [style.backgroundImage]="'url(' + mainPageImage2 + ')'"
      role="img"
      [attr.aria-label]="'landing.previewImage2Alt' | transloco"
      (click)="peelTo(2)">
      <p class="landing-media-caption">{{ 'landing.previewImage2Caption' | transloco }}</p>
    </section>

    <section
      class="landing-panel landing-panel--media landing-panel--media-1"
      [style.backgroundImage]="'url(' + mainPageImage1 + ')'"
      role="img"
      [attr.aria-label]="'landing.previewImage1Alt' | transloco"
      (click)="peelTo(1)">
    </section>

    <section class="landing-panel landing-panel--intro" aria-label="Introduction" (click)="peelTo(0)">
      <div class="landing-panel__intro-inner">
        <app-logo size="splash" />
        <p class="landing-tagline">{{ 'landing.heroSubtitle' | transloco }}</p>
        <p class="landing-hover-hint">{{ 'landing.hoverHint' | transloco }}</p>
      </div>
      <div class="landing-peel-zones" aria-hidden="true">
        <button type="button" class="landing-peel-zone" (click)="peelTo(1); $event.stopPropagation()"></button>
        <button type="button" class="landing-peel-zone" (click)="peelTo(2); $event.stopPropagation()"></button>
      </div>
    </section>
  </main>

  <footer class="landing-footer" id="landing-footer">
    <app-public-footer />
  </footer>
</div>
