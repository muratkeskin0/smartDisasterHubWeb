<div class="dashboard">
  <app-header></app-header>

  <main class="dashboard-main">
    <div class="welcome-section">
      <h2>Welcome, {{ firstName }}</h2>
      <p>Access disaster monitoring and analysis features</p>
    </div>

    <!-- Features Grid -->
    <div class="features-grid">
      <a routerLink="/text-analysis" class="feature-card">
        <div class="feature-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
        </div>
        <div class="feature-content">
          <h3>Text Analysis</h3>
          <p>View analyzed Reddit posts for disaster relevance</p>
        </div>
        <div class="feature-arrow">→</div>
      </a>

      <a routerLink="/map" class="feature-card">
        <div class="feature-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
            <circle cx="12" cy="10" r="3"></circle>
          </svg>
        </div>
        <div class="feature-content">
          <h3>Disaster Map</h3>
          <p>Explore disaster-related posts on an interactive map</p>
        </div>
        <div class="feature-arrow">→</div>
      </a>

      <a routerLink="/profile" class="feature-card">
        <div class="feature-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
        <div class="feature-content">
          <h3>Profile</h3>
          <p>Manage your account settings and preferences</p>
        </div>
        <div class="feature-arrow">→</div>
      </a>
    </div>
  </main>
</div>
